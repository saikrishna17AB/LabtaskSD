<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Labeling Dashboard</title>
    <link rel="stylesheet" href="dashboard.css">
</head>
<body>
    <header>
        <h1 id="imageTitle">Select an Image</h1>
        <button onclick="window.location.href='projects.html'">Back to Projects</button>
    </header>

    <div style="display: flex;">
        <aside style="width: 200px; background: #1e293b; padding: 10px;">
            <input type="file" id="imageInput" webkitdirectory directory multiple>
            <button onclick="uploadImages()">Upload Directory</button>
            <div id="imageList"></div>
        </aside>

        <main style="flex-grow: 1; text-align: center;">
            <input type="text" id="label" placeholder="Enter label name (e.g. Car)">
            <br><br>
            <canvas id="canvas" style="border: 2px solid #6366f1; cursor: crosshair;"></canvas>
        </main>
    </div>

    <div class="toolbar">
    <input type="text" id="label" placeholder="Label Name">
    <button onclick="saveImage()" style="background: #10b981;">Save Progress</button>
    <button onclick="downloadCSV()" style="background: #f59e0b;">Download CSV</button>
</div>

    <script src="project.js"></script>
    <script src="dashboard.js"></script>
</body>
</html>
